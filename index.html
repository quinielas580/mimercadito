<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Bazar-PIQ</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #contenedor {
            text-align: center;
            width: 90%;
            max-width: 360px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* El logo ahora busca el archivo local */
        #mi-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        #cargando-box {
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #menu-botones {
            display: none; /* Se activa tras 3 segundos */
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn {
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: background 0.3s;
        }
        .btn-web { background-color: #007bff; }
        .btn-web:hover { background-color: #0056b3; }
        
        .btn-apk { background-color: #28a745; }
        .btn-apk:hover { background-color: #218838; }

        .desc {
            display: block;
            font-size: 11px;
            font-weight: normal;
            margin-top: 4px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <img src="logomercadito.png" alt="Bazar-PIQ" id="mi-logo">
        
        <div id="cargando-box">
            <div class="spinner"></div>
            <p style="color: #666; font-size: 14px;">Cargando opciones...</p>
        </div>

        <div id="menu-botones">
            <button class="btn btn-web" onclick="irWeb()">
                IR A LA TIENDITA
                <span class="desc">Abrir en el navegador</span>
            </button>

            <button class="btn btn-apk" onclick="bajarAPK()">
                DESCARGAR APLICACIÓN
                <span class="desc">Instalar archivo APK</span>
            </button>
        </div>
    </div>

    <script>
        const URL_TIENDA = "https://script.google.com/macros/s/AKfycbx6Z36D3M_YPzn-ntdeKPhsx1lhmrxmuQhAPmgBxj5nEN_PY20t9dFJipnkvLry2h7lOA/exec";
        
        // Aquí puedes poner el nombre del archivo APK si también lo tienes en la misma carpeta
        const NOMBRE_APK = "BazarPIQ.apk"; 

        setTimeout(() => {
            document.getElementById('cargando-box').style.display = 'none';
            document.getElementById('menu-botones').style.display = 'flex';
        }, 3000);

        function irWeb() {
            window.location.href = URL_TIENDA;
        }

        function bajarAPK() {
            // Esto intentará descargar el archivo que esté en la misma carpeta
            window.location.href = NOMBRE_APK;
        }
    </script>
</body>
</html>
